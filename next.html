<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pibli TV - Responsive Concept</title>
  <style>
    /* =========================================
           RESET & BASE STYLES
           ========================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
        Arial, sans-serif;
    }

    body {
      background-color: #050509;
      color: #c7c7c8;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* =========================================
           MOBILE LAYOUT (Default / Mobile-First)
           ========================================= */
    .app-container {
      width: 100%;
      max-width: 480px;
      background-color: #050509;
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
      border-left: 1px solid #56585d;
      border-right: 1px solid #56585d;
      transition: all 0.3s ease;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .app-header h1 {
      color: #ffffff;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .profile-icon {
      width: 36px;
      height: 36px;
      background-color: #56585d;
      border-radius: 50%;
      cursor: pointer;
    }
  a {
        color: #24f553;
        text-decoration: none;
    }
    /* Video Player */
    .video-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #000;
      position: relative;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Info Section */
    .video-info {
      padding: 24px 20px;
    }

    .video-title {
      color: #ffffff;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .video-desc {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Buttons */
    .btn-primary {
      background-color: #24f553;
      color: #050509;
      border: none;
      padding: 16px 24px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      width: 100%;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #189f38;
      color: #ffffff;
    }

    /* Tags / Categories */
    .categories {
      margin-top: 8px;
    }

    .categories h3 {
      color: #ffffff;
      font-size: 1.1rem;
      margin-bottom: 12px;
      padding: 0 20px;
    }

    .tags-container {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 0 20px;
      scrollbar-width: none;
    }

    .tags-container::-webkit-scrollbar {
      display: none;
    }

    .tag {
      background-color: #2f4a39;
      color: #24f553;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .tag:hover {
      background-color: #189f38;
      color: #fff;
    }

    /* Bottom Navigation (Mobile) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background-color: #050509;
      display: flex;
      justify-content: space-around;
      padding: 16px 0;
      border-top: 1px solid #56585d;
      z-index: 10;
    }

    .nav-item {
      color: #56585d;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .nav-item:hover {
      color: #c7c7c8;
    }

    .nav-item.active {
      color: #24f553;
    }

    /* =========================================
           DESKTOP LAYOUT (Layar > 768px)
           ========================================= */
    @media (min-width: 768px) {
      body {
        justify-content: flex-start;
        /* Reset center alignment */
      }

      .app-container {
        max-width: 100%;
        margin-left: 240px;
        /* Sisakan ruang untuk Sidebar */
        border-left: none;
        border-right: none;
        padding-bottom: 40px;
      }

      /* Ubah Navigasi Bawah menjadi Sidebar Kiri */
      .bottom-nav {
        top: 0;
        left: 0;
        bottom: auto;
        transform: none;
        width: 240px;
        height: 100vh;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 40px;
        padding-left: 40px;
        gap: 32px;
        border-top: none;
        border-right: 1px solid #56585d;
      }

      .nav-item {
        font-size: 1.1rem;
      }

      /* Penyesuaian Ruang Utama */
      .app-header {
        padding: 40px;
      }

      .app-header h1 {
        font-size: 2rem;
      }

      main {
        padding: 0 40px;
        max-width: 1200px;
        /* Batasi lebar maksimal konten */
        margin: 0 auto;
      }

      .video-wrapper {
        border-radius: 16px;
        /* Tambahkan sudut melengkung pada desktop */
        overflow: hidden;
      }

      /* Susun Judul & Tombol Bersebelahan */
      .video-info {
        padding: 32px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
      }

      .video-info-text {
        flex: 1;
      }

      .video-title {
        font-size: 2.2rem;
        margin-bottom: 12px;
      }

      .video-desc {
        font-size: 1rem;
        margin-bottom: 0;
        max-width: 600px;
      }

      .btn-primary {
        width: auto;
        padding: 16px 48px;
        font-size: 1.1rem;
      }

      /* Penyesuaian Kategori */
      .categories {
        margin-top: 16px;
      }

      .categories h3 {
        padding: 0;
        font-size: 1.4rem;
        margin-bottom: 16px;
      }

      .tags-container {
        padding: 0;
      }

      .tag {
        padding: 12px 24px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <nav class="bottom-nav">
    <div class="nav-item active">Halaman Utama</div>
    <div class="nav-item">Siaran Langusng</div>
    <div class="nav-item">Siaran Ulang</div>
    <div class="nav-item">Jadwal Berikutnya</div>
  </nav>

  <div class="app-container">
    <header class="app-header">
      <h1>Pibli TV</h1>
      <div class="profile-icon"></div>
    </header>

    <main>
      <div class="video-wrapper">
        
       <iframe id="match-player" src="https://streams.esportex.site/player#dXMvZm94Mg=="
          class="absolute inset-0 w-full h-full border-0" allowfullscreen=""
          allow="autoplay; encrypted-media; picture-in-picture; fullscreen" referrerpolicy="no-referrer" loading="eager"
          sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"></iframe>
      </div>

      <section class="video-info">
        <div class="video-info-text">
          <h2 class="video-title">Live 2</h2>
          <p class="video-desc">
            Tonton siaran langsung pertandingan hari ini. Kualitas HD tanpa
            buffering.
          </p>
        </div>
        <button class="btn-primary">Tonton Sekarang</button>
      </section>

      <section class="categories">
        <h3>Sedang Tren</h3>
        <div class="tags-container">
          <div class="tag">
            <a href="index.html">
              <span role="img" aria-label="Trophy">📺</span> Match 1
            </a>
          </div>
          <div class="tag">
            <a href="#">
              <span role="img" aria-label="Trophy">📺</span> Match 3
            </a>
          </div>
          <div class="tag">
            <a href="#">
              <span role="img" aria-label="Trophy">📺</span> Match 4
            </a>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
