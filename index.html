<html lang="id">

<head>
  <meta charset="UTF-8" />

  <title>Pibli TV - Responsive Concept</title>
  <style>
   /* =========================================
   RESET & BASE STYLES
   ========================================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
  background-color: #050509;
  color: #c7c7c8;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

/* =========================================
   KONTEN UTAMA (MAIN & CARD)
   ========================================= */
main {
  display: flex;
  flex-direction: column; /* Membuat konten berderet ke bawah pada mobile */
  gap: 35px;             /* MEMBERI SPACE KE BAWAH ANTAR KONTEN LIVE 1 & 2 */
  padding: 20px;
}

.main {
  position: relative;
  width: 100%;
  max-width: 20em;       /* Menyesuaikan lebar card */
  margin: 0 auto;        /* Center item pada mobile */
}

.card {
  width: 20em;
  height: 15em;
  background-color: #252525;
  border-radius: 7px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.fl {
  display: flex;
  justify-content: flex-end;
  opacity: 0;
  transition: .2s ease-in-out;
  position: absolute;
  top: 0;
  right: 0;
  z-index: 2;
}

.fl:hover .fullscreen {
  scale: 1.2;
}

.fl:hover .fullscreen_svg {
  fill: white;
}

.fullscreen {
  width: 1.5em;
  height: 1.5em;
  border-radius: 5px;
  background-color: #727890;
  margin: 1em;
  margin-right: 0.5em;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .2s ease-in-out;
  box-shadow: 2px 2px 6px rgba(0, 0, 0, .4);
}

.fullscreen_svg {
  width: 15px;
  height: 15px;
  fill: rgb(177, 176, 176);
  transition: .2s ease-in-out;
}

.card_back {
  position: absolute;
  width: 15em;
  height: 13em;
  background-color: rgba(30, 31, 38, 0.575);
  border-radius: 7px;
  margin-top: -5em;
  margin-left: 0.7em;
  transition: .2s ease-in-out;
  z-index: -1;
}

.main:hover .card_back {
  margin-top: -6.25em;
  margin-left: 0em;
  scale: 1.1;
  height: 15.25em;
  cursor: pointer;
}

.main:hover .fl {
  opacity: 1;
  cursor: pointer;
  margin-right: 0.5em;
}

.data {
  display: flex;
  flex-direction: row;
  margin-top: 1em;
}

.img {
  width: 2.25em;
  height: 2.25em;
  background-color: #252525;
  border-radius: 5px;
  overflow: hidden;
}

.text {
  display: flex;
  justify-content: center;
  flex-direction: column;
  margin-left: 0.5em;
  font-family: Montserrat, sans-serif;
  color: white;
}

.text_m {
  font-weight: bold;
  font-size: 0.9em;
}

.text_s {
  font-size: 0.7em;
}

.btns {
  display: flex;
  gap: 0.5em;
  transition: .2s ease-in-out;
  margin-top: 10px;
}

.likes, .comments, .views {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 1.8em;
  border-radius: 4px;
  opacity: 0;
  background-color: #444857;
  transition: .2s ease-in-out;
  padding: 2px 8px;
}

.likes_text, .comments_text, .views_text {
  font-family: Montserrat, sans-serif;
  font-size: 0.8em;
  margin-left: 0.25em;
  color: white;
}

.likes_svg, .comments_svg, .views_svg {
  width: 12px;
  height: 12px;
}
.likes_svg { fill: rgb(204, 3, 3); }
.comments_svg, .views_svg { fill: white; }

.likes:hover, .comments:hover, .views:hover {
  background-color: #5A5F73;
  cursor: pointer;
}

.main:hover .likes, .main:hover .comments, .main:hover .views {
  opacity: 1;
}

/* =========================================
       MOBILE LAYOUT (Default)
       ========================================= */
.app-container {
  width: 100%;
  max-width: 480px;
  background-color: #050509;
  min-height: 100vh;
  position: relative;
  padding-bottom: 80px;
  border-left: 1px solid #56585d;
  border-right: 1px solid #56585d;
  transition: all 0.3s ease;
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

.app-header h1 {
  color: #ffffff;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.profile-icon {
  width: 36px;
  height: 36px;
  background-color: #56585d;
  border-radius: 50%;
  cursor: pointer;
}

/* MENU NAVIGASI BAWAH (MOBILE BERSIH & RAPI) */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background-color: #0a0a12;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 16px 10px;
  border-top: 1px solid #2a2c30;
  z-index: 100;
}

.nav-item {
  color: #56585d;
  font-size: 0.75rem; /* Dikecilkan sedikit agar muat rapi di mobile */
  font-weight: 600;
  cursor: pointer;
  transition: color 0.2s ease;
  text-align: center;
  white-space: nowrap;
}

.nav-item:hover {
  color: #c7c7c8;
}

.nav-item.active {
  color: #24f553;
}

/* =========================================
       DESKTOP LAYOUT (Layar > 768px)
       ========================================= */
/* =========================================
       DESKTOP LAYOUT (Layar > 768px)
       ========================================= */
@media (min-width: 768px) {
  body {
    justify-content: flex-start;
  }

  .app-container {
    max-width: calc(100% - 260px); /* Memastikan kontainer mengambil sisa layar setelah sidebar */
    margin-left: 260px; /* Jarak pas untuk sidebar */
    border-left: none;
    border-right: none;
    padding-bottom: 40px;
    width: 100%;
  }

  /* Mengubah Navigasi Bawah Menjadi Sidebar Kiri yang Rapi */
  .bottom-nav {
    top: 0;
    left: 0;
    bottom: auto;
    transform: none;
    width: 260px;
    height: 100vh;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    padding-top: 50px;
    padding-left: 35px;
    gap: 25px;
    border-top: none;
    border-right: 1px solid #2a2c30;
    background-color: #050509;
  }

  .nav-item {
    font-size: 1.05rem;
    text-align: left;
  }

  .app-header {
    padding: 40px 40px 20px 40px;
  }

  .app-header h1 {
    font-size: 2rem;
  }

  /* Grid Konten di Desktop */
  main {
    display: flex;
    flex-direction: row !important;  /* Memaksa berjejer ke samping */
    flex-wrap: wrap;                 /* Otomatis turun ke bawah jika layar tidak muat */
    gap: 40px;                       /* Jarak antar card horizontal & vertikal */
    padding: 20px 40px;
    max-width: 100%;
    margin: 0;
    justify-content: flex-start;     /* Berbaris dari kiri */
  }

  .main {
    margin: 0;                       /* Reset auto-margin mobile */
    width: 20em;                     /* Mengunci lebar pembungkus luar sesuai ukuran card */
    max-width: none;
  }
}
